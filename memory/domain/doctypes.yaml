# Doctype registry — what document types a German Planungsbüro
# produces. Universal domain knowledge; same registry applies to every
# deployment.
#
# Per-deployment template paths are NOT stored here — they live in
# `office_config.templates.doctype_overrides[<doctype>]`. The app's
# shipped skeletons under `plugin/templates/skeletons/<doctype>/` are
# the default; offices override only if they need a custom skeleton.
#
# Add a new doctype by appending an entry. Each doctype has structural
# domain rules (class, engine, paired-with relationships); office-specific
# styling lives in the office's `office-style.sty`.

version: 1

doctypes:
  b-plan-begruendung:
    label: "B-Plan Begründung"
    description: >
      Multi-page narrative explanatory document for a Bebauungsplan.
      Document class: scrreprt (KOMA). Engine: pdflatex.
    style_ref: memory/domain/style/style-spec.md#doctype-a-begruendung
    master_file_pattern: "B-Plan Begründung.tex"
    project_subfolder_default: B-Plan/Begründung
    paired_with: b-plan-festsetzungen   # produced as a pair per B-Plan

  b-plan-festsetzungen:
    label: "Textliche Festsetzungen (Teil B Text der Satzung)"
    description: >
      Single long page Satzung containing the binding textual rules of
      a Bebauungsplan. Embedded as Teil B Text in the Satzung document.
      Document class: article. Engine: pdflatex. Sans-serif body.
    style_ref: memory/domain/style/style-spec.md#doctype-b-festsetzungen
    master_file_pattern: "Textteil-B-B-Plan.tex"
    project_subfolder_default: B-Plan/Festsetzungen
    paired_with: b-plan-begruendung

  umweltbericht:
    label: "Umweltbericht"
    description: >
      Environmental report. Modular per-Schutzgut structure with paired
      _UB / _Mas_UB files (description + Maßnahmen).
    style_ref: TBD
    master_file_pattern: TBD
    project_subfolder_default: Umweltbericht
    status: deferred                    # not yet ready for orchestrator routing

  artenschutz:
    label: "Artenschutzbewertung / SPA"
    description: >
      Species protection assessment. May be drafted independently or
      as part of a B-Plan package. Often produced by a GIS/biology
      sub-practice within the office.
    style_ref: TBD
    master_file_pattern: TBD
    project_subfolder_default: Externe Gutachten
    status: deferred

  abwaegung:
    label: "Abwägung (Stellungnahmen)"
    description: >
      Response document pairing each Stellungnahme from public/Behörde
      consultation with the office's analysis and Abwägungsergebnis.
      Per-Stellungnahme block structure.
    status: deferred

# Other Berichtstypen common in German planning practice. Listed here
# for awareness; activate when first project requires them.
berichtstypen_planned:
  - kapitel: AA
    label: Ausnahmeantrag
    status: stub
  - kapitel: AFB
    label: Artenschutzfachbeitrag
    status: stub
  - kapitel: GK
    label: Gebäudekontrolle
    status: stub
  - kapitel: KB
    label: Kartierbericht
    status: stub
  - kapitel: LBP
    label: Landschaftspflegerischer Begleitplan
    status: stub
  - kapitel: SPA_HP
    label: Speziell artenschutzrechtliche Prüfung — Hauptprüfung
    status: stub
  - kapitel: SPA_VP
    label: Speziell artenschutzrechtliche Prüfung — Vorprüfung
    status: stub
  - kapitel: ZAV
    label: Zielabweichungsverfahren
    status: stub
