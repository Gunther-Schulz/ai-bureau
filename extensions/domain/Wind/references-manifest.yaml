# Wind (Windenergie an Land) domain references manifest. Loaded when
# an office's scope.domains contains "Wind". Holds Wind-specific
# federal Gesetze (WindBG), KNE-Wind Leitfäden, Helgoländer Papier,
# and Wind-specific methodology (Albrecht 2014 Fledermaus-Wind).
#
# Universal frameworks (BauGB, EEG, BImSchG, BNatSchG §45b) live in
# extensions/universal/ and extensions/domain/Naturschutz/. State-
# specific Wind references (e.g. OVG-MV Wind-Urteile) live in the
# matching state manifest.
#
# Schema documented at:
#   plugin/skills/research-references/references/manifest-schema.md

