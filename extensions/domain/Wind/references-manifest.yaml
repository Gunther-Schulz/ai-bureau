        archive_versions: true
        retention_versions: 5
        ingest: true
        chunking_strategy: per-paragraph
        chunk_metadata_extractor: gesetze-im-internet
        status: active
        notes: |
          Flächenziel-Gesetz: 2.2% bis Ende 2026, 4.4% bis Ende 2030.
          §6 modifiziert Artenschutzprüfung in ausgewiesenen
          Windgebieten — relevant für jede Wind-Begründung im
          Geltungsbereich eines Windgebiets nach LROP/RROP. Letzte
          Änderung Art. 4 Gesetz v. 12.08.2025.
        tags: [wind, federal, flaechenziel, paragraph-6]

