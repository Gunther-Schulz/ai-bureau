# Universal references manifest. Federal frameworks that apply to
# EVERY German Planungsbüro regardless of planning domain (PV-FFA,
# Wind, Innenentwicklung, ...) or Bundesland.
#
# Domain-specific federal references (e.g. KNE-PV-* leitfäden →
# domain/PV-FFA, BNatSchG + FFH-RL + naturschutz urteile →
# domain/Naturschutz, WindBG + Helgoländer-Papier → domain/Wind)
# live in per-domain manifests under extensions/domain/<X>/.
#
# State references (LPlG-X, LBauO-X, NatSchAG-X, OVG-X rulings,
# state Verfahrenserlasse, LUNG/StALU leitfäden) live in per-state
# manifests under extensions/state/<X>/.
#
# Schema documented at:
#   plugin/skills/research-references/references/manifest-schema.md
#
# Empty `last_fetched`, `checksum_sha256`, `current_amendment_form`
# fields are populated by the research-references skill on first run.

