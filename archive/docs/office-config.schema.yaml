# office-config.yaml — schema for per-deployment office configuration
#
# Location resolution (loader checks in order):
#   1. $PBS_OFFICE_CONFIG          — explicit env var override
#   2. ${XDG_CONFIG_HOME}/pbs-bureau/office.yaml
#   3. ~/.config/pbs-bureau/office.yaml
#
# This file is per-deployment. It is NEVER committed to the app repo.
# The setup-office skill generates it interactively on first run and
# migrates the schema_version when fields are added in future versions.
#
# Every field is shown here with type + purpose + required/optional status.
# Values shown are illustrative.

# --- Schema versioning ---------------------------------------------------

schema_version: 3   # required. setup-office migrates older configs forward.
                    # v2 → v3 (session 5): merged office+identity, paths→roots,
                    # practices+partners→actors, dropped extensions block (now
                    # discovered by walking <repo>/extensions/ filtered by scope),
                    # integrations: free-form list instead of fixed-key map.

# --- Office identity (merged in v3 — was split between office + identity) -

office:
  name: "Planungsbüro Schulz"      # required. Full name used in headers/output.
  short: "PBS"                     # required. Abbreviation used in IDs/filenames.
  language: de_DE                  # required. Output language of drafts.
                                   # Currently only de_DE is supported.

  title: "<Akademischer Titel>"    # optional, e.g. "Dipl.-Ing." — used in
                                   # signer macros and letterhead

  address_lines:                   # required, ≥1 lines. Used in cover mails.
    - "<Office Name>"
    - "<Street + Number>"
    - "<PLZ City>"

  phone: "<phone>"                 # optional
  mobile: "<mobile>"               # optional, separate Funk/cell field
  fax: "<fax>"                     # optional
  email: "<office-email>"          # optional
  web: "<office-website>"          # optional

  specializations:                 # optional list of disciplines printed
    - "<Discipline 1>"             # on the office letterhead
    - "<Discipline 2>"

  logo_path: "<absolute-path>"     # optional, image referenced by
                                   # office-style.sty as \OfficeLogoPath
  signature_image_path: "<path>"   # optional, scanned signature for
                                   # signed PDFs as \OfficeSignaturePath

  signature_block: |               # required. Inserted verbatim into cover
    Mit freundlichen Grüßen        # mails / Anschreiben.
    <Title> <Full Name>
    <Office Name>

# NOTE: Bundesland is per-PROJECT (in `_ai/state.md.bundesland`), not an
# office property. The office's `scope.states` lists which Bundesländer it
# operates in; each project picks one from that list.

# --- Actors (merged in v3 — was split between practices + partners) ------
#
# An actor is a signing entity. Internal actors are sub-units of THIS
# office (formerly `practices`); external actors are partners the office
# regularly works with (formerly `partners`). They share the same shape;
# `kind` discriminates. Email-routing logic is uniform across kinds.
#
# At least one internal actor is required.

actors:
  - id: main
    kind: internal                 # internal | external
    label: "Planungsbüro Schulz"
    signer: "Gunther Schulz"
    email: "FILL_IN_PBS_EMAIL"
    email_match_patterns:
      - "*@FILL_IN_PBS_DOMAIN"

  - id: <partner-short-id>
    kind: external
    label: "<Display Name>"
    signer: "<Full Name>"
    specialization: "<Discipline>"
    email: "<contact@partner-domain>"
    email_match_patterns:
      - "*@partner-domain"
    phone: "<phone>"
    web: "<partner-website>"

# --- Filesystem roots (merged in v3 — was paths + templates.office_style_dir) -

roots:
  state: "/mnt/data2t/.../_ai-office-state"          # required
  references: "/mnt/data2t/.../_ai-references"       # required
  projects: "/mnt/data2t/.../Projekte"               # required
  local_repos: "~/dev/Planungsbüro-Schulz"           # optional. Set if the
                                                     # office uses per-doctype
                                                     # LaTeX repos in a dev tree.
  office_style_dir: "<state>/templates"              # optional. Defaults to
                                                     # <state>/templates/.
                                                     # Holds office-style.sty +
                                                     # auto-generated office-identity.tex.
  office_extensions: "<state>/extensions"            # optional. If set, the loader
                                                     # walks this tree IN ADDITION TO
                                                     # <repo>/extensions/ for office-local
                                                     # references / doctypes additions.
                                                     # Same <universal,domain/<X>,state/<X>>
                                                     # subtree layout.

# --- Scope --------------------------------------------------------------
#
# Which planning domains and Bundesländer this office operates in. Drives
# the layered manifest discovery (loader walks <repo>/extensions/ filtered
# by this scope, plus roots.office_extensions if set).
#
# Domains correspond to subdirs under <repo>/extensions/domain/ (e.g.
# PV-FFA, Wind, Naturschutz, Innenentwicklung). New domains added via
# the `author-manifest` skill.
#
# States are 2-letter Bundesland codes (BB, BW, BY, BE, HB, HH, HE, MV,
# NI, NW, RP, SH, SL, SN, ST, TH).

scope:
  domains: [PV-FFA, Wind, Naturschutz]   # subset of available domain
                                         # manifests this office activates
  states: [MV]                           # Bundesländer the office operates in

# --- Integrations (free-form list in v3 — was fixed-key map) ------------
#
# Each integration is declared explicitly. Omit any class the office
# doesn't use. The class set is open: any string is valid; resolution
# succeeds when a matching subpackage exists at
# `backend/.../integrations/<class>/<adapter>.py`.
#
# Known classes (each has a Python subpackage with a Protocol):
#   email, calendar, scanner, phone, accounting
# Future classes can be added without schema changes (DMS, GIS, CAD,
# TöB-Portal, project-management, etc.).

integrations:
  - class: email
    adapter: thunderbird-maildir         # | imap | outlook-pst | mbox-file
    config:
      profile_path: "~/.thunderbird/profile.default"

  - class: scanner
    adapter: hot-folder
    config:
      watch_dir: "~/Documents/Scans/"

  # Empty list / omit `integrations:` entirely if the office doesn't
  # currently integrate with external systems.

# --- LaTeX templates (3-layer cake) -------------------------------------
#
# Layer 1 — App: ships document classes (.cls) + skeletons under
#           plugin/templates/skeletons/{universal,domain/<X>}/<doctype>/
# Layer 2 — Office: provides office-style.sty (geometry, header, fonts,
#           colors) + auto-generated office-identity.tex (from `office:`
#           above) + optional domain-specific office-style overlays
#           (office-style.PV-FFA.sty, office-style.Wind.sty,
#           office-style.Naturschutz.sty)
# Layer 3 — Project: per-project Projektdaten.tex + master .tex
#
# Compile sets TEXINPUTS to recursively include project dir, office
# style dir (from roots.office_style_dir), app classes, and the layered
# skeletons tree.

templates:
  skeleton_source: app             # "app" | <override-dir>. "app" uses
                                   # plugin/templates/skeletons/.
  identity_macros: auto            # "auto" — regenerate office-identity.tex
                                   # from `office:` before each compile.
                                   # | <path> — use hand-maintained file.
  doctype_overrides: {}            # optional. Per-doctype skeleton overrides.
                                   # Used as escape hatch only.

# --- Conventions --------------------------------------------------------

conventions:
  project_naming: "{year_2}-{nr} {client} - {location}"
  project_numbering:
    pattern: YY-NN                 # YY-NN | YYYY-NN | NN | YY/NN
    auto_increment: true
  project_folder_layout:
    inputs: "inputs/"
    sent_versions: "Auslieferung/"
    correspondence: "Schriftverkehr/"
    toeb: "TöB/"

  # OPTIONAL — substring-pattern classifiers for ingest source paths.
  # Used by tools/ingest.py:_infer_source_subtype to assign metadata when
  # writing to LanceDB. Override only if the office uses non-default folder
  # names (e.g., `.ai/snapshots/` instead of `_ai/snapshots/`, or flat
  # `Gesetze-Bund/` instead of nested `gesetze/bund/`). Partial override is
  # supported — declared subtypes use config; the rest fall back to
  # hardcoded patterns for the canonical layout.
  #
  # Within each source-type, subtypes are checked in YAML-declared order;
  # first matching pattern wins. Order matters when one subtype's pattern
  # is a superset of another's (e.g., `gesetz-state: [/gesetze/]` listed
  # before `gesetz-bund: [/gesetze/bund/]` would swallow the latter).
  #
  # Per ARCHITECTURE.md meta-rule 4 + audit slice 14 finding 2a: this
  # block lifts deployment-tunable classification logic out of hardcoded
  # Python into deployment-overridable office config. Pre-launch addition
  # in session 6; safe to omit entirely (purely additive — defaults match
  # prior behavior).
  path_classification:                          # optional; entire block
    corpus:                                     # optional sub-block
      # snapshot: ["/_ai/snapshots/", "/.ai/snapshots/"]
      # correspondence: ["/correspondence/", "schriftverkehr"]
    reference:                                  # optional sub-block
      # gesetz-bund: ["/gesetze/bund/"]
      # gesetz-eu: ["/gesetze/eu/"]
      # gesetz-state: ["/gesetze/"]            # MUST come after bund/eu
      # leitfaden: ["/leitfaeden/"]
      # urteil: ["/urteile/"]
      # beispiel: ["/beispiele/"]
    baustein:                                   # optional sub-block
      # universal: ["/bausteine/universal/"]
      # domain: ["/bausteine/domain/"]
      # state: ["/bausteine/state/"]
      # project: ["/bausteine/projects/", "/_ai/bausteine/", "/.ai/bausteine/"]
