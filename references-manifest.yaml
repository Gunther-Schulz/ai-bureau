# Federal-core references manifest. Lists references universal to
# every German Planungsbüro: federal laws, EU directives, federal
# court rulings, federal-level leitfäden (e.g. KNE), national
# methodology standards.
#
# State-specific references (LandesPlG, LBauO, NatSchAG des Landes,
# state Verfahrenserlasse, state environmental authority leitfäden)
# live in per-state extension manifests. See
# `docs/office-extensions/<STATE>/references-manifest.example.yaml`
# for the template; offices place their copy at
# `office_config.paths.state_root/extensions/<STATE>/references-manifest.yaml`.
#
# Schema documented at:
#   plugin/skills/research-references/references/manifest-schema.md
#
# Empty `last_fetched`, `checksum_sha256`, `current_amendment_form`
# fields are populated by the research-references skill on first run.

