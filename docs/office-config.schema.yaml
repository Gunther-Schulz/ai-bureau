# office-config.yaml — schema for per-deployment office configuration
#
# Location resolution (loader checks in order):
#   1. $PBS_OFFICE_CONFIG          — explicit env var override
#   2. ${XDG_CONFIG_HOME}/pbs-bureau/office.yaml
#   3. ~/.config/pbs-bureau/office.yaml
#
# This file is per-deployment. It is NEVER committed to the app repo.
# The setup-office skill generates it interactively on first run and
# migrates the schema_version when fields are added in future versions.
#
# Every field is shown here with type + purpose + required/optional status.
# Values shown are illustrative.

# --- Schema versioning ---------------------------------------------------

schema_version: 2   # required. setup-office migrates older configs forward.

# --- Office identity -----------------------------------------------------

office:
  name: "Planungsbüro Schulz"      # required. Full name used in headers/output.
  short: "PBS"                     # required. Abbreviation used in IDs/filenames.
  language: de_DE                  # required. Output language of drafts.
                                   # Currently only de_DE is supported.

# NOTE: Bundesland is per-PROJECT (in `_ai/state.md.bundesland`), not an
# office property. The office's `scope.states` lists which Bundesländer it
# operates in (drives state-extension manifest selection); each project
# picks one from that list at bind/setup time.

identity:                          # required block.
  title: "<Akademischer Titel>"    # optional, e.g. "Dipl.-Ing." — used in
                                   # signer macros and letterhead
  address_lines:                   # required, ≥1 lines. Used in cover mails.
    - "<Office Name>"
    - "<Street + Number>"
    - "<PLZ City>"
  phone: "<phone>"                 # optional
  mobile: "<mobile>"               # optional, separate Funk/cell field
  fax: "<fax>"                     # optional
  email: "<office-email>"          # optional
  web: "<office-website>"          # optional
  specializations:                 # optional list of disciplines printed
    - "<Discipline 1>"             # on the office letterhead
    - "<Discipline 2>"
  logo_path: "<absolute-path>"     # optional, image referenced by
                                   # office-style.sty as \OfficeLogoPath
  signature_image_path: "<path>"   # optional, scanned signature for
                                   # signed PDFs as \OfficeSignaturePath
  signature_block: |               # required. Inserted verbatim into cover
    Mit freundlichen Grüßen        # mails / Anschreiben.
    <Title> <Full Name>
    <Office Name>

# --- Practices (internal sub-units of THIS office) ----------------------

practices:                         # required, ≥1 entry.
  - id: main
    label: "Planungsbüro Schulz"
    signer: "Gunther Schulz"
    email: "FILL_IN_PBS_EMAIL"
    email_match_patterns:
      - "*@FILL_IN_PBS_DOMAIN"

# --- Partners (external collaborators) ---------------------------------

partners:                          # optional list (default: [])
  - id: <short-id>
    label: "<Display Name>"
    signer: "<Full Name>"
    specialization: "<Discipline>"
    email: "<contact@partner-domain>"
    email_match_patterns:
      - "*@partner-domain"
    phone: "<phone>"
    web: "<partner-website>"

# --- Filesystem paths ---------------------------------------------------

paths:
  state_root: "/mnt/data2t/.../_ai-office-state"      # required
  references_root: "/mnt/data2t/.../_ai-references"   # required
  projects_root: "/mnt/data2t/.../Projekte"           # required
  local_repos_root: "~/dev/Planungsbüro-Schulz"       # optional. Set if the
                                                      # office uses per-doctype
                                                      # LaTeX repos in a dev tree.

# --- Scope --------------------------------------------------------------
#
# Which planning domains and Bundesländer this office operates in. Drives
# the layered manifest loader (universal + per-domain + per-state). Set
# during setup-office multi-select; edit by hand or re-run setup-office
# to change later.
#
# Domains correspond to subdirs under <repo>/extensions/domain/ (e.g.
# PV-FFA, Wind, Naturschutz, Innenentwicklung). New domains added via
# the `author-manifest` skill.
#
# States are 2-letter Bundesland codes (BB, BW, BY, BE, HB, HH, HE, MV,
# NI, NW, RP, SH, SL, SN, ST, TH).

scope:
  domains: [PV-FFA, Wind, Naturschutz]   # subset of available domain
                                         # manifests this office activates
  states: [MV]                           # Bundesländer the office operates in

# --- Reference + doctype extensions (layered manifests) -----------------
#
# Layered along scope:
#   - universal: applies to every deployment (ships in repo)
#   - domain[<X>]: applies when scope.domains contains X (ships in repo)
#   - state[<X>]: applies when scope.states contains X (ships in repo,
#                 may be overridden per-office for state-local additions)
#
# The loader walks the union of selected manifests at startup and
# whenever a tool needs to enumerate references/doctypes. Order:
# universal → each domain in scope.domains order → each state in
# scope.states order.

extensions:
  references_manifests:
    universal: "<repo>/extensions/universal/references-manifest.yaml"
    domain:
      PV-FFA: "<repo>/extensions/domain/PV-FFA/references-manifest.yaml"
      Wind: "<repo>/extensions/domain/Wind/references-manifest.yaml"
      Naturschutz: "<repo>/extensions/domain/Naturschutz/references-manifest.yaml"
    state:
      MV: "<repo>/extensions/state/MV/references-manifest.yaml"
      # office-local state additions (e.g. an MV-bureau adds regional
      # Leitfäden specific to NW-MV) go to a separate file:
      # MV-office-additions: "<state_root>/extensions/MV/office-additions.yaml"

  doctypes_manifests:
    universal: "<repo>/extensions/universal/doctypes.yaml"
    domain:
      Naturschutz: "<repo>/extensions/domain/Naturschutz/doctypes.yaml"
      # PV-FFA / Wind doctypes can be added similarly when needed
    state:
      # MV: "<repo>/extensions/state/MV/doctypes.yaml"   # if MV has variants

# --- Integrations (pluggable adapters) ----------------------------------
#
# External systems each declared as adapter + adapter-specific config.
# `adapter: none` is the default no-op (the integration is unused).
# Real adapters land under backend/.../integrations/<class>/<adapter>.py
# and are selected by name here.

integrations:
  email:
    adapter: none                  # | thunderbird-maildir | imap | outlook-pst | mbox-file
    config: {}                     # adapter-specific (e.g. profile_path)
  calendar:
    adapter: none                  # | caldav | exchange-ews | ical-file
    config: {}
  scanner:
    adapter: none                  # | hot-folder | escli | tesseract
    config: {}
  phone:
    adapter: none                  # | call-log-csv | (provider adapters)
    config: {}
  accounting:
    adapter: none                  # | (per provider)
    config: {}

# --- LaTeX templates (3-layer cake) -------------------------------------
#
# Layer 1 — App: ships document classes (.cls) + skeletons under
#           plugin/templates/skeletons/{universal,domain/<X>}/<doctype>/
# Layer 2 — Office: provides office-style.sty (geometry, header, fonts,
#           colors) + auto-generated office-identity.tex (from `identity:`
#           above) + optional domain-specific office-style overlays
#           (office-style.PV-FFA.sty, office-style.Wind.sty)
# Layer 3 — Project: per-project Projektdaten.tex + master .tex
#
# Compile sets TEXINPUTS to recursively include project dir, office
# style dir, app classes, and the layered skeletons tree.

templates:
  skeleton_source: app             # "app" | <override-dir>. "app" uses
                                   # plugin/templates/skeletons/.
  office_style_dir: "<state_root>/templates"
                                   # required. Directory containing
                                   # office-style.sty + the auto-generated
                                   # office-identity.tex.
  identity_macros: auto            # "auto" — regenerate office-identity.tex
                                   # from `identity:` before each compile.
                                   # | <path> — use hand-maintained file.
  doctype_overrides: {}            # optional. Per-doctype skeleton overrides.
                                   # Used as escape hatch only.

# --- Conventions --------------------------------------------------------

conventions:
  project_naming: "{year_2}-{nr} {client} - {location}"
  project_numbering:
    pattern: YY-NN                 # YY-NN | YYYY-NN | NN | YY/NN
    auto_increment: true
  project_folder_layout:
    inputs: "inputs/"
    sent_versions: "Auslieferung/"
    correspondence: "Schriftverkehr/"
    toeb: "TöB/"
